[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "auto"

[logger]
level = "info"

[server]
port = 8501
headless = true
enableXsrfProtection = true
enableWebsocketCompression = true
